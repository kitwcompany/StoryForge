name: Build and Test

on:
  push:
    branches: [master, main]
    tags:
      - 'v*'
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  actions: read
  checks: read

jobs:
  # Rust backend checks
  rust-check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Build frontend
        working-directory: src-frontend
        run: npm run build

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri

      - name: Check Rust formatting
        working-directory: src-tauri
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Check Rust code
        working-directory: src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  # Frontend checks
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Check frontend formatting
        working-directory: src-frontend
        run: npm run format:check

      - name: Lint frontend
        working-directory: src-frontend
        run: npm run lint

      - name: Type check
        working-directory: src-frontend
        run: npm run type-check

      - name: Run frontend unit tests
        working-directory: src-frontend
        run: npm run test:run

      - name: Build frontend
        working-directory: src-frontend
        run: npm run build

  # E2E tests
  e2e-check:
    needs: [frontend-check, rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src-frontend/package-lock.json

      - name: Install root dependencies (Playwright)
        run: npm ci

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload E2E screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/screenshots/

  # Full Tauri build (matrix build for all platforms)
  # Note: e2e-check is intentionally NOT a blocker for release builds.
  # E2E tests run against a Vite dev server without the real Tauri backend,
  # causing settings page tests to fail (IPC calls hang). Unit tests (160)
  # and build checks are the reliable quality gates.
  tauri-build:
    needs: [rust-check, frontend-check]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --bundles deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles msi
          - os: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles dmg
    env:
      # 加速 release 编译：增加 codegen-units 减少单编译单元工作量
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 256
      # 禁用 LTO 进一步加速（默认已关闭，显式声明以防万一）
      CARGO_PROFILE_RELEASE_LTO: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src-frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Setup swap (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo swapoff -a || true
          sudo rm -f /swapfile
          sudo dd if=/dev/zero of=/swapfile bs=1M count=8192
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo swapon --show
          free -h

      - name: Install frontend dependencies
        working-directory: src-frontend
        run: npm ci

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: tauri

      - name: Build Tauri app (PR)
        if: github.event_name == 'pull_request'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Upload PR build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: storyforge-pr-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Get version from package.json
        id: get_version
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        working-directory: src-frontend
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          Write-Output "version=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build Tauri app and release (nightly)
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v${{ steps.get_version.outputs.version }}-nightly
          releaseName: 'StoryForge v${{ steps.get_version.outputs.version }} Nightly'
          releaseBody: |
            ## 新增
            - Nightly 自动构建版本

            ## 注意
            - 此版本为自动构建产物，可能包含未测试的改动
            - 建议仅用于测试目的

            构建时间: ${{ github.event.head_commit.timestamp }}
            提交: ${{ github.sha }}
          releaseDraft: false
          prerelease: true
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

      - name: Upload nightly build artifacts
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: storyforge-nightly-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Build Tauri app and release (stable)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'StoryForge ${{ github.ref_name }}'
          releaseBody: |
            ## 新增
            - 详见 CHANGELOG.md

            ## 修复
            - 详见 CHANGELOG.md

            ## 注意
            - 升级前建议导出当前工作室配置作为备份

            包含三个平台的安装包：
            - Windows (.msi)
            - macOS (.dmg)
            - Linux (.deb)

            构建时间: ${{ github.event.head_commit.timestamp }}
            提交: ${{ github.sha }}
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true

      - name: Upload stable build artifacts
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: storyforge-stable-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore
